<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./src/assets/Logo.webp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Otimizações para performance -->
    <meta name="theme-color" content="#ffffff">
    <meta name="color-scheme" content="light">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="João Victor - Desenvolvedor Front-end especializado em Vue.js e Headless CMS (Contentful). Criação de sites modernos, rápidos e otimizados para SEO.">
    <meta name="keywords" content="desenvolvedor front-end, Vue.js, Contentful, headless CMS, desenvolvimento web, portfolio, João Victor">
    <meta name="author" content="João Victor">
    
    <!-- Preload recursos críticos -->
    <link rel="preload" as="image" href="./src/assets/background.webp" type="image/webp">
    <link rel="preload" as="image" href="./src/assets/Logo.webp" type="image/webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload da fonte crítica para melhorar FCP -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@100;200;300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@100;200;300;400;500;600;700&display=swap" media="all">
    
    <!-- CSS crítico inline para melhor FCP -->
    <style>
        /* CSS Crítico inline */
        *{box-sizing:border-box;margin:0;padding:0}
        html{font-size:16px;scroll-behavior:smooth}
        body{font-family:"IBM Plex Serif",serif;font-size:1.5rem;line-height:1.6;color:#111;text-align:justify;background:#fff;overflow-x:hidden}
        #app{min-height:100vh;position:relative}
        .background{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;object-fit:cover;object-position:center;will-change:transform;transform:translateZ(0)}
        h1,h2,h3,h4,h5,h6{font-weight:700;margin:0 0 1rem 0;line-height:1.2}
        h1{font-size:3rem;text-align:center}
        h2{font-size:2.5rem}
        a,a:visited{color:#000;text-decoration:underline;transition:opacity 0.2s ease}
        a:hover{opacity:0.8}
        .underlined-cont{padding-bottom:4px;margin-bottom:4px;border-bottom:4px solid #111}
        @media (max-width:900px){body{font-size:1.2rem}h1{font-size:2.5rem}h2{font-size:2rem}}
    </style>
    
    <!-- Preload do CSS não crítico -->
    <link rel="preload" as="style" href="/src/assets/main.css">
    <link rel="stylesheet" href="/src/assets/main.css" media="all">
    
    <!-- Google Analytics otimizado - carregamento adiado -->
    <script>
        // Adiar carregamento do Google Analytics para não bloquear FCP
        window.addEventListener('load', () => {
            requestIdleCallback(function () {
                window.dataLayer = window.dataLayer || [];
                function gtag(){dataLayer.push(arguments);}
                gtag('js', new Date());
                gtag('config', 'G-WCSQMLNCNB');
                
                const gtm = document.createElement('script');
                gtm.src = 'https://www.googletagmanager.com/gtag/js?id=G-WCSQMLNCNB';
                gtm.async = true;
                document.head.appendChild(gtm);
            });
        });
    </script>
    <title>João Victor | Desenvolvedor Front-end Vue e Headless CMS (Contentful)</title>
</head>
<body style="font-family: 'IBM Plex Serif', serif;">
<div id="app">
</div>
<script type="module" src="/src/main.js"></script> <!-- Verifique se o caminho está correto -->
</body>
</html>
